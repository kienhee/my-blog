<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0c0c0c"/>
    </linearGradient>
    <linearGradient id="cardL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f1e"/>
      <stop offset="100%" style="stop-color:#120d18"/>
    </linearGradient>
    <linearGradient id="cardR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a12"/>
      <stop offset="100%" style="stop-color:#0d1511"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Background dots pattern -->
  <g fill="#1a1a1a">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/>
    <circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/>
    <circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/>
    <circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/><circle cx="1200" cy="100" r="1.5"/>
    <circle cx="1300" cy="100" r="1.5"/><circle cx="1400" cy="100" r="1.5"/><circle cx="1500" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/>
    <circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/>
    <circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/><circle cx="1200" cy="200" r="1.5"/>
    <circle cx="1300" cy="200" r="1.5"/><circle cx="1400" cy="200" r="1.5"/><circle cx="1500" cy="200" r="1.5"/>
    <circle cx="100" cy="900" r="1.5"/><circle cx="200" cy="900" r="1.5"/><circle cx="300" cy="900" r="1.5"/>
    <circle cx="1300" cy="900" r="1.5"/><circle cx="1400" cy="900" r="1.5"/><circle cx="1500" cy="900" r="1.5"/>
  </g>

  <!-- Title -->
  <text x="800" y="130" font-family="Arial Black, sans-serif" font-size="11" fill="#3f3f46" text-anchor="middle" letter-spacing="5">CLOUDFLARE WORKERS AUTOMATION</text>
  <text x="800" y="210" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="#f5f5f5" text-anchor="middle" letter-spacing="-2">Readwise ’ Notion</text>
  <text x="800" y="260" font-family="Arial, sans-serif" font-size="16" fill="#52525b" text-anchor="middle">Automatically sync your Readwise highlights to a structured Notion database</text>

  <!-- Flow line -->
  <line x1="400" y1="540" x2="660" y2="540" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="940" y1="540" x2="1200" y2="540" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Arrow -->
  <text x="800" y="550" font-family="Arial, sans-serif" font-size="28" fill="#3f3f46" text-anchor="middle">’</text>

  <!-- Readwise card -->
  <rect x="160" y="360" width="500" height="360" rx="12" fill="url(#cardL)" stroke="#3d1f4d" stroke-width="1"/>
  <rect x="160" y="360" width="500" height="56" rx="12" fill="#2d1540" stroke="none"/>
  <rect x="160" y="392" width="500" height="24" fill="#2d1540"/>
  <text x="400" y="394" font-family="Arial Black, sans-serif" font-size="13" fill="#c084fc" text-anchor="middle" letter-spacing="2">READWISE</text>
  <!-- Highlight entries -->
  <rect x="184" y="440" width="452" height="58" rx="6" fill="#1a0a24" stroke="#3d1f4d" stroke-width="1"/>
  <text x="200" y="464" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">"The best code is no code at all."</text>
  <text x="200" y="484" font-family="Arial, sans-serif" font-size="10" fill="#4c3060"> Jeff Atwood · Coding Horror</text>

  <rect x="184" y="510" width="452" height="58" rx="6" fill="#1a0a24" stroke="#3d1f4d" stroke-width="1"/>
  <text x="200" y="534" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">"Simplicity is the ultimate sophistication."</text>
  <text x="200" y="554" font-family="Arial, sans-serif" font-size="10" fill="#4c3060"> Leonardo da Vinci · Various</text>

  <rect x="184" y="580" width="452" height="58" rx="6" fill="#1a0a24" stroke="#3d1f4d" stroke-width="1"/>
  <text x="200" y="604" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">"Make it work, make it right, make it fast."</text>
  <text x="200" y="624" font-family="Arial, sans-serif" font-size="10" fill="#4c3060"> Kent Beck · TDD</text>

  <text x="400" y="700" font-family="monospace, Courier New" font-size="10" fill="#4c3060" text-anchor="middle">847 highlights synced</text>

  <!-- Notion card -->
  <rect x="940" y="360" width="500" height="360" rx="12" fill="url(#cardR)" stroke="#1a3d22" stroke-width="1"/>
  <rect x="940" y="360" width="500" height="56" rx="12" fill="#0f2e17" stroke="none"/>
  <rect x="940" y="392" width="500" height="24" fill="#0f2e17"/>
  <text x="1190" y="394" font-family="Arial Black, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" letter-spacing="2">NOTION DATABASE</text>

  <!-- DB table header -->
  <rect x="960" y="436" width="460" height="28" rx="4" fill="#0a2010"/>
  <text x="972" y="454" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" letter-spacing="1">TITLE</text>
  <text x="1160" y="454" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" letter-spacing="1">BOOK</text>
  <text x="1300" y="454" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" letter-spacing="1">DATE</text>

  <!-- DB rows -->
  <rect x="960" y="472" width="460" height="28" rx="0" fill="#0d1a10"/>
  <text x="972" y="490" font-family="Arial, sans-serif" font-size="10" fill="#86efac">The best code is no code</text>
  <text x="1160" y="490" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Coding Horror</text>
  <text x="1300" y="490" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Today</text>

  <rect x="960" y="500" width="460" height="28" rx="0" fill="#0c1a0f"/>
  <text x="972" y="518" font-family="Arial, sans-serif" font-size="10" fill="#86efac">Simplicity is sophistication</text>
  <text x="1160" y="518" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Various</text>
  <text x="1300" y="518" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Today</text>

  <rect x="960" y="528" width="460" height="28" rx="0" fill="#0d1a10"/>
  <text x="972" y="546" font-family="Arial, sans-serif" font-size="10" fill="#86efac">Make it work, make it right</text>
  <text x="1160" y="546" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">TDD</text>
  <text x="1300" y="546" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Today</text>

  <rect x="960" y="556" width="460" height="28" rx="0" fill="#0c1a0f"/>
  <text x="972" y="574" font-family="Arial, sans-serif" font-size="10" fill="#86efac">Good design is invisible</text>
  <text x="1160" y="574" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Design</text>
  <text x="1300" y="574" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Today</text>

  <rect x="960" y="584" width="460" height="28" rx="0" fill="#0d1a10"/>
  <text x="972" y="602" font-family="Arial, sans-serif" font-size="10" fill="#86efac">Premature optimization is the root...</text>
  <text x="1160" y="602" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Knuth</text>
  <text x="1300" y="602" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46">Today</text>

  <text x="1190" y="700" font-family="monospace, Courier New" font-size="10" fill="#1a3d22" text-anchor="middle">’ 847 rows updated</text>

  <!-- Worker badge -->
  <rect x="680" y="492" width="240" height="96" rx="8" fill="#0a0a0a" stroke="#1f1f1f" stroke-width="1"/>
  <text x="800" y="520" font-family="monospace, Courier New" font-size="10" fill="#f97316" text-anchor="middle" letter-spacing="2">CF WORKER</text>
  <text x="800" y="544" font-family="monospace, Courier New" font-size="11" fill="#6e7681" text-anchor="middle">cron: 0 8 * * *</text>
  <text x="800" y="568" font-family="monospace, Courier New" font-size="10" fill="#3f3f46" text-anchor="middle">Daily · 8:00 AM UTC</text>

  <!-- Stats row -->
  <text x="800" y="800" font-family="Arial, sans-serif" font-size="11" fill="#3f3f46" text-anchor="middle" letter-spacing="2">847 HIGHLIGHTS · 23 BOOKS · ZERO DOWNTIME</text>
</svg>
