<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Title area -->
  <text x="800" y="100" font-family="Arial, sans-serif" font-size="10" fill="#3f3f46" text-anchor="middle" letter-spacing="5">TYPESCRIPT LIBRARY</text>

  <!-- Shield icon placeholder -->
  <polygon points="800,140 840,160 840,210 800,230 760,210 760,160" fill="none" stroke="#6366f1" stroke-width="2"/>
  <text x="800" y="194" font-family="Arial Black, sans-serif" font-size="18" fill="#6366f1" text-anchor="middle"></text>

  <text x="800" y="280" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#f5f5f5" text-anchor="middle" letter-spacing="-2">type-safe-env</text>
  <text x="800" y="330" font-family="Arial, sans-serif" font-size="15" fill="#52525b" text-anchor="middle">Validate your .env variables at runtime with full TypeScript support</text>

  <!-- Code editor window -->
  <rect x="120" y="380" width="660" height="520" rx="10" fill="#0d0d12" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Editor title bar -->
  <rect x="120" y="380" width="660" height="40" rx="10" fill="#161622"/>
  <rect x="120" y="406" width="660" height="14" fill="#161622"/>
  <circle cx="152" cy="400" r="6" fill="#ff5f57"/>
  <circle cx="172" cy="400" r="6" fill="#febc2e"/>
  <circle cx="192" cy="400" r="6" fill="#28c840"/>
  <text x="400" y="404" font-family="monospace, Courier New" font-size="11" fill="#4a4a6a" text-anchor="middle">env.ts</text>
  <!-- Line numbers bg -->
  <rect x="120" y="420" width="44" height="480" fill="#0a0a10"/>

  <!-- Line numbers -->
  <text x="152" y="452" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">1</text>
  <text x="152" y="476" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">2</text>
  <text x="152" y="500" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">3</text>
  <text x="152" y="524" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">4</text>
  <text x="152" y="548" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">5</text>
  <text x="152" y="572" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">6</text>
  <text x="152" y="596" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">7</text>
  <text x="152" y="620" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">8</text>
  <text x="152" y="644" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">9</text>
  <text x="152" y="668" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">10</text>
  <text x="152" y="692" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">11</text>
  <text x="152" y="716" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">12</text>
  <text x="152" y="740" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">13</text>
  <text x="152" y="764" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">14</text>
  <text x="152" y="788" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">15</text>
  <text x="152" y="812" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">16</text>
  <text x="152" y="836" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">17</text>
  <text x="152" y="860" font-family="monospace, Courier New" font-size="13" fill="#2a2a3a" text-anchor="end">18</text>

  <!-- Code content -->
  <text x="178" y="452" font-family="monospace, Courier New" font-size="13" fill="#6366f1">import</text>
  <text x="240" y="452" font-family="monospace, Courier New" font-size="13" fill="#e6edf3"> { createEnv } </text>
  <text x="394" y="452" font-family="monospace, Courier New" font-size="13" fill="#6366f1">from</text>
  <text x="430" y="452" font-family="monospace, Courier New" font-size="13" fill="#a5f3a5"> "type-safe-env"</text>
  <text x="560" y="452" font-family="monospace, Courier New" font-size="13" fill="#e6edf3">;</text>

  <text x="178" y="476" font-family="monospace, Courier New" font-size="13" fill="#6366f1">import</text>
  <text x="240" y="476" font-family="monospace, Courier New" font-size="13" fill="#e6edf3"> { z } </text>
  <text x="296" y="476" font-family="monospace, Courier New" font-size="13" fill="#6366f1">from</text>
  <text x="332" y="476" font-family="monospace, Courier New" font-size="13" fill="#a5f3a5"> "zod"</text>
  <text x="378" y="476" font-family="monospace, Courier New" font-size="13" fill="#e6edf3">;</text>

  <text x="178" y="524" font-family="monospace, Courier New" font-size="13" fill="#6366f1">export const</text>
  <text x="314" y="524" font-family="monospace, Courier New" font-size="13" fill="#fbbf24"> env</text>
  <text x="348" y="524" font-family="monospace, Courier New" font-size="13" fill="#e6edf3"> = createEnv({</text>

  <text x="178" y="548" font-family="monospace, Courier New" font-size="13" fill="#6e7681">  server: {</text>
  <text x="178" y="572" font-family="monospace, Courier New" font-size="13" fill="#6e7681">    DATABASE_URL: z.string().url(),</text>
  <text x="178" y="596" font-family="monospace, Courier New" font-size="13" fill="#6e7681">    API_SECRET: z.string().min(32),</text>
  <text x="178" y="620" font-family="monospace, Courier New" font-size="13" fill="#6e7681">    SMTP_PORT: z.coerce.number().default(587),</text>
  <text x="178" y="644" font-family="monospace, Courier New" font-size="13" fill="#6e7681">  },</text>
  <text x="178" y="668" font-family="monospace, Courier New" font-size="13" fill="#6e7681">  client: {</text>
  <text x="178" y="692" font-family="monospace, Courier New" font-size="13" fill="#6e7681">    NEXT_PUBLIC_URL: z.string().url(),</text>
  <text x="178" y="716" font-family="monospace, Courier New" font-size="13" fill="#6e7681">    NEXT_PUBLIC_GA_ID: z.string().optional(),</text>
  <text x="178" y="740" font-family="monospace, Courier New" font-size="13" fill="#6e7681">  },</text>
  <text x="178" y="764" font-family="monospace, Courier New" font-size="13" fill="#6e7681">  runtimeEnv: process.env,</text>
  <text x="178" y="788" font-family="monospace, Courier New" font-size="13" fill="#6e7681">});</text>

  <!-- Tooltip / intellisense popup -->
  <rect x="400" y="610" width="330" height="70" rx="6" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="416" y="632" font-family="monospace, Courier New" font-size="11" fill="#6366f1">DATABASE_URL:</text>
  <text x="548" y="632" font-family="monospace, Courier New" font-size="11" fill="#e6edf3"> string</text>
  <text x="416" y="650" font-family="monospace, Courier New" font-size="10" fill="#4a4a6a">Type-safe server env variable</text>
  <text x="416" y="666" font-family="monospace, Courier New" font-size="10" fill="#3f3f46">Validated at startup · Zod schema</text>

  <!-- Right panel: error output -->
  <rect x="840" y="380" width="640" height="320" rx="10" fill="#12040a" stroke="#3d0a1a" stroke-width="1"/>
  <rect x="840" y="380" width="640" height="40" rx="10" fill="#1e0812"/>
  <rect x="840" y="406" width="640" height="14" fill="#1e0812"/>
  <text x="1160" y="404" font-family="monospace, Courier New" font-size="11" fill="#6e2a3a" text-anchor="middle">Terminal  Error</text>

  <text x="860" y="448" font-family="monospace, Courier New" font-size="12" fill="#f87171"> Invalid environment variables:</text>
  <rect x="860" y="462" width="600" height="1" fill="#2a0a14"/>
  <text x="860" y="488" font-family="monospace, Courier New" font-size="12" fill="#6e7681">  DATABASE_URL:</text>
  <text x="860" y="510" font-family="monospace, Courier New" font-size="11" fill="#f87171">    ¸ Invalid url: must start with http/https</text>
  <text x="860" y="540" font-family="monospace, Courier New" font-size="12" fill="#6e7681">  API_SECRET:</text>
  <text x="860" y="562" font-family="monospace, Courier New" font-size="11" fill="#f87171">    ¸ String must contain at least 32 chars</text>
  <text x="860" y="592" font-family="monospace, Courier New" font-size="11" fill="#4a4a6a">    Fix your .env.local and restart.</text>
  <rect x="860" y="610" width="600" height="1" fill="#2a0a14"/>
  <text x="860" y="634" font-family="monospace, Courier New" font-size="11" fill="#3d0a1a">Process exited with code 1</text>
  <text x="860" y="658" font-family="monospace, Courier New" font-size="11" fill="#3d0a1a">No silent failures. Ship with confidence.</text>

  <!-- Right: success output -->
  <rect x="840" y="720" width="640" height="180" rx="10" fill="#040d08" stroke="#0a2010" stroke-width="1"/>
  <rect x="840" y="720" width="640" height="40" rx="10" fill="#081510"/>
  <rect x="840" y="746" width="640" height="14" fill="#081510"/>
  <text x="1160" y="744" font-family="monospace, Courier New" font-size="11" fill="#1a4a2a" text-anchor="middle">Terminal  Success</text>

  <text x="860" y="788" font-family="monospace, Courier New" font-size="12" fill="#4ade80"> Environment validated successfully</text>
  <text x="860" y="812" font-family="monospace, Courier New" font-size="11" fill="#3f3f46">  5 server variables · 2 client variables</text>
  <text x="860" y="834" font-family="monospace, Courier New" font-size="11" fill="#3f3f46">  ˛ Next.js 16.2.6 ready on localhost:3000</text>
  <text x="860" y="858" font-family="monospace, Courier New" font-size="11" fill="#1a4a2a">  0 undefined · 0 type errors · 0 surprises</text>

  <!-- Badges -->
  <text x="800" y="960" font-family="monospace, Courier New" font-size="10" fill="#3f3f46" text-anchor="middle" letter-spacing="3">TYPESCRIPT · ZOD · ZERO RUNTIME OVERHEAD</text>
</svg>
